services:
  - type: web
    name: labelx-backend
    env: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-eng libgl1-mesa-glx
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
